name: Deploy libretranslate image

on:
  push:
    branches: [ nx-app ]
    paths:
      - 'libretranslate-dockerfile'
      - '.github/workflows/deploy-libretranslate-image.yml'
  schedule:
    - cron: "0 3 * * 0,4"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: caiocampos/libretranslate
  LANGUAGES: "pt,en,es,it,fr,de"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: libretranslate-dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          
          build-args: |
            TARGET_LANGS=${{ env.LANGUAGES }}
          cache-from: type=gha
          cache-to: type=gha,mode=max










