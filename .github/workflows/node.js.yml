name: Node.js CI

on:
  pull_request:
    branches: [ nx-app ]

jobs:
  build:
    env:
      SERVER_URL: 127.0.0.1
      SERVER_PORT: 8080
      FULL_BUILD: false

    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: yarn install
    - name: Build
      run: yarn build
    
