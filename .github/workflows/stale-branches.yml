name: Limpar Branches

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  stale_branches:
    runs-on: ubuntu-latest
    steps:
      - name: Stale Branches
        uses: crs-k/stale-branches@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 120
          days-before-delete: 7
          comment-on-stale: 'Esta branch está inativa e será removida em breve.'
          
          branches-filter-regex: '^dependabot/'
