name: Deploy

on:
  push:
    branches: [ nx-app ]
  schedule:
    - cron: "0 0-2,8-23/2 * * *"
  workflow_dispatch:

jobs:
  build:
    env:
      NEXT_PUBLIC_SERVER_URL: 127.0.0.1
      NEXT_PUBLIC_SERVER_PORT: 8080
      NEXT_PUBLIC_FULL_BUILD: true

      APP_PORT: 8080
      APP_ENV: production
      
      TRANSLATION_API_URL: http://127.0.0.1:5000
      TRANSLATION_API_TIMEOUT: 20s
      
      GITHUB_API_URL: https://api.github.com
      GITHUB_API_TIMEOUT: 10s
      GITHUB_API_USER_LOGIN: caiocampos
      GITHUB_API_ORGS_LOGIN: "[\"cao-ancap\"]"

      REDIS_ADDR: ${{ secrets.REDIS_ADDR }}
      REDIS_USER: ${{ secrets.REDIS_USER }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      REDIS_DB: ${{ secrets.REDIS_DB }}
      REDIS_CACHE_TTL: 168h

    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Download Server Binary
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
           gh release download -R caiocampos/cached-translation-middleware -D middleware -p "server"
           chmod +x ./middleware/server

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install
      run: yarn install

    - name: Run translate service
      run: |
           npm run libretranslate
           docker ps

    - name: Run server
      run: |
          nohup ./middleware/server > out.log 2>&1 &

          PROCESS_PID=$!
          echo "APP_PID=$PROCESS_PID" >> $GITHUB_ENV

          sleep 5

          if pgrep -f "server" > /dev/null
          then
              echo "Server running in background"
          else
              echo "Server failed"
              exit 1
          fi

    - name: Build
      run: yarn build

    - name: Stop translate service
      if: always()
      run: npm run libretranslate-stop

    - name: Stop server
      if: always()
      run: kill ${{ env.APP_PID }}

    - name: Adjustment
      run: |
           cp .nojekyll ./out/.nojekyll

    - name: Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: master
        folder: out
